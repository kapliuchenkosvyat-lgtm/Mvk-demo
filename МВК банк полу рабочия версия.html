<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>МВК — Банк</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet">
<!-- QR генерируется встроенным кодом, без внешних зависимостей -->
<style>
:root{
  --bg:#0a0a0a;
  --surface:#121212;
  --surface-2:#1c1c1c;
  --surface-3:#262626;
  --stroke:rgba(255,255,255,.09);
  --stroke-soft:rgba(255,255,255,.06);
  --text:#ffffff;
  --text-dim:#a8a8a8;
  --text-faint:#717171;
  --paper:#fafaf8;
  --paper-2:#f0f0ee;
  --ink:#111111;
  --ink-dim:#7a7a78;
  --line:#e6e4dc;
  --green:#21c46d;
  --green-soft:rgba(33,196,109,.14);
  --green-dim:#1a9e58;
  --red:#e2574c;
  --red-soft:rgba(226,87,76,.14);
  --gold:#3ee089;
  --r-lg:24px;
  --r-md:16px;
  --r-sm:11px;
}
/* ============== СВЕТЛАЯ ТЕМА (оверрайд тёмных экранов) ============== */
html.theme-light .view.dark:not(.no-theme){
  --bg:#fbfbf9;
  --surface:#ffffff;
  --surface-2:#f0f0ee;
  --surface-3:#e4e2d8;
  --stroke:rgba(0,0,0,.08);
  --stroke-soft:rgba(0,0,0,.05);
  --text:#111111;
  --text-dim:#7a7a78;
  --text-faint:#9a9890;
}
html.theme-light .view.dark:not(.no-theme) [style*="color:#fff"]{ color:var(--ink) !important; }
html.theme-light .iconbtn.ghost-bg{ background:rgba(0,0,0,.05) !important; }
html.theme-light .tabbar.on-dark{ background:rgba(250,250,248,.94) !important; border-top:1px solid rgba(0,0,0,.08) !important; }
html.theme-light .tabbar.on-dark .tab{ color:#9a9890 !important; }
html.theme-light .tabbar.on-dark .tab.active{ color:var(--green) !important; }
html.theme-light .btn-ghost-light{ background:rgba(0,0,0,.05) !important; color:var(--ink) !important; border-color:rgba(0,0,0,.16) !important; }
html.theme-light .view.dark:not(.no-theme) .pill-neutral{ background:rgba(0,0,0,.06) !important; }
html.theme-light .view.dark:not(.no-theme) .divider-dark{ background:rgba(0,0,0,.08) !important; }
html.theme-light .view.dark:not(.no-theme) [style*="rgba(255,255,255,.08)"]{ background:rgba(0,0,0,.06) !important; }
html.theme-light .view.dark:not(.no-theme) [style*="rgba(255,255,255,.1)"]{ background:rgba(0,0,0,.06) !important; }
html.theme-light .view.dark:not(.no-theme) [style*="rgba(255,255,255,.12)"]{ background:rgba(0,0,0,.08) !important; }
html.theme-light .view.dark:not(.no-theme) [style*="rgba(255,255,255,.06)"]{ background:rgba(0,0,0,.05) !important; }
html.theme-light .view.dark:not(.no-theme) .avatar{ color:var(--ink) !important; }
html.theme-light .view.dark:not(.no-theme) .avatar[style*="background:var(--ink)"]{ color:#fff !important; }
html.theme-light .view.dark:not(.no-theme) .key{ color:var(--ink) !important; }
html.theme-light .view.dark:not(.no-theme) .key:active{ background:rgba(0,0,0,.06) !important; }
html.theme-light .view.dark:not(.no-theme) .ticket-card{ color:var(--ink) !important; }
html.theme-light .no-theme{
  --bg:#0a0a0a;
  --surface:#121212;
  --surface-2:#1c1c1c;
  --surface-3:#262626;
  --stroke:rgba(255,255,255,.09);
  --stroke-soft:rgba(255,255,255,.06);
  --text:#ffffff;
  --text-dim:#a8a8a8;
  --text-faint:#717171;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:#000;
  font-family:'Manrope',sans-serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-feature-settings:"tnum" 1,"kern" 1;
  overscroll-behavior:none;
  position:fixed;
  width:100%;
}
h1,h2,h3{ font-family:'Unbounded',sans-serif; margin:0; line-height:1.3; letter-spacing:.005em; }
p{ line-height:1.55; margin:0; }
button{ font-family:inherit; }
.num{ font-feature-settings:"tnum" 1; letter-spacing:.01em; font-variant-numeric:tabular-nums; }

/* ============== APP SHELL ============== */
#app{
  max-width:480px;
  height:100vh;
  height:100dvh;
  margin:0 auto;
  background:var(--paper);
  position:relative;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  overflow-y:hidden;
}
@media (min-width:481px){
  body{ display:flex; justify-content:center; padding:24px 0; }
  #app{ height:860px; border-radius:36px; box-shadow:0 30px 80px -20px rgba(0,0,0,.7); overflow:hidden; }
}

.view{ display:none; flex-direction:column; flex:1; min-height:0; }
.view.active{ display:flex; flex-direction:column; }
.view.dark{ background:var(--bg); color:var(--text); }
.view.paper{ background:var(--paper); color:var(--ink); }
.view-scroll{ flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.view-scroll::-webkit-scrollbar{ display:none; }

/* ============== TOPBAR ============== */
.topbar{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:40px 1fr 40px;
  align-items:center;
  padding:18px 16px 6px;
  gap:10px;
}
.topbar .center-label{
  text-align:center;
  font-size:11px;
  letter-spacing:.13em;
  text-transform:uppercase;
  font-weight:700;
  color:var(--ink-dim);
}
.view.dark .topbar .center-label{ color:var(--text-dim); }
.iconbtn{
  width:40px;height:40px;
  border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--ink);
  flex:0 0 auto;
  padding:0;
}
.iconbtn svg{ width:20px; height:20px; display:block; }
.view.dark .iconbtn{ color:var(--text); }
.iconbtn.ghost-bg{ background:rgba(0,0,0,.045); }
.view.dark .iconbtn.ghost-bg{ background:rgba(255,255,255,.07); }
.iconbtn:disabled{ opacity:.3; cursor:not-allowed; }

/* ============== МЕНЮ АККАУНТА (overlay) ============== */
.acct-menu-overlay{
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,.5);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .18s ease;
}
.acct-menu-overlay.show{ opacity:1; visibility:visible; }
.acct-menu-sheet{
  width:100%; max-width:480px; background:var(--paper); color:var(--ink);
  border-radius:24px 24px 0 0; padding:20px 20px 28px;
  transform:translateY(16px); transition:transform .18s ease;
}
.acct-menu-overlay.show .acct-menu-sheet{ transform:translateY(0); }
.acct-menu-header{ display:flex; align-items:center; gap:12px; padding:4px 4px 14px; }
.acct-menu-item{
  width:100%; text-align:left; display:flex; align-items:center; gap:12px;
  padding:13px 6px; background:none; border:none; cursor:pointer;
  font-weight:700; font-size:14.5px; color:var(--ink); font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}
.acct-menu-item .emo{ font-size:17px; width:22px; text-align:center; flex:0 0 auto; }

/* ============== GENERIC ============== */
.pad{ padding:24px; }
.pad-t0{ padding-top:0; }
.eyebrow{
  font-size:11px; letter-spacing:.13em; text-transform:uppercase;
  font-weight:700; color:var(--ink-dim); line-height:1.4;
}
.view.dark .eyebrow{ color:var(--text-dim); }
.small{ font-size:12.5px; color:var(--ink-dim); line-height:1.55; }
.view.dark .small{ color:var(--text-dim); }
.center{ text-align:center; }
.mt6{margin-top:6px;} .mt8{margin-top:8px;} .mt10{margin-top:10px;}
.mt12{margin-top:12px;} .mt14{margin-top:14px;} .mt16{margin-top:16px;}
.mt20{margin-top:20px;} .mt24{margin-top:24px;} .mt28{margin-top:28px;} .mt32{margin-top:32px;}
.mb6{margin-bottom:6px;} .mb8{margin-bottom:8px;} .mb10{margin-bottom:10px;}
.mb12{margin-bottom:12px;} .mb16{margin-bottom:16px;} .mb20{margin-bottom:20px;} .mb24{margin-bottom:24px;}

.row{ display:flex; align-items:center; }
.between{ justify-content:space-between; }
.col{ display:flex; flex-direction:column; }
.gap6{gap:6px;} .gap8{gap:8px;} .gap10{gap:10px;} .gap12{gap:12px;} .gap14{gap:14px;} .gap16{gap:16px;}
.flex1{ flex:1 1 auto; min-width:0; }

.btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:16px; border-radius:var(--r-md);
  border:none; font-weight:700; font-size:15px; cursor:pointer;
  transition:transform .12s ease, opacity .12s ease, background .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{ transform:scale(.965); }
.btn:disabled{ opacity:.4; cursor:not-allowed; }
.btn-primary{ background:var(--green); color:#06140d; }
.btn-primary:hover{ background:#28d67a; }
.btn-dark{ background:var(--ink); color:#fff; }
.btn-ghost{ background:transparent; color:var(--ink); border:1.5px solid rgba(0,0,0,.16); }
.btn-ghost-light{ background:rgba(255,255,255,.06); color:#fff; border:1.5px solid rgba(255,255,255,.14); }
.btn-danger{ background:var(--red-soft); color:var(--red); }
.btn-sm{ padding:11px; font-size:13.5px; border-radius:12px; }

.field{
  width:100%; padding:16px 18px; border-radius:var(--r-md);
  border:1.5px solid var(--line); background:#fff;
  font-size:15.5px; font-weight:600; color:var(--ink);
  margin-bottom:12px; -webkit-appearance:none; appearance:none;
  font-family:inherit;
}
.phone-field-wrap{
  display:flex; align-items:center; gap:0;
  width:100%; border-radius:var(--r-md);
  border:1.5px solid var(--line); background:#fff;
  margin-bottom:12px; padding-left:18px;
  transition:border-color .15s ease;
}
.phone-field-wrap:focus-within{ border-color:var(--ink); }
.phone-field-wrap .prefix{
  font-size:15.5px; font-weight:600; color:var(--ink); flex:0 0 auto;
  padding-right:2px;
}
.phone-field-wrap input{
  flex:1 1 auto; min-width:0; border:none; outline:none; background:transparent;
  padding:16px 18px 16px 6px; font-size:15.5px; font-weight:600; color:var(--ink);
  font-family:inherit; -webkit-appearance:none; appearance:none;
}
.phone-field-wrap input::placeholder{ color:#aeac9f; font-weight:500; }
.field:focus{ outline:none; border-color:var(--ink); }
.field::placeholder{ color:#aeac9f; font-weight:500; }
.field-label{ font-size:12.5px; font-weight:700; color:var(--ink-dim); margin:0 0 6px 2px; }
.view.dark .field-label{ color:var(--text-dim); }
.field-error{ font-size:12px; color:var(--red); font-weight:700; margin:-6px 0 12px 2px; min-height:15px; }

.card{ background:#fff; border-radius:var(--r-lg); padding:20px; }
.card-dark{ background:var(--surface-2); border-radius:var(--r-lg); padding:20px; }
.card-line{ border:1.5px solid var(--line); }

.pill{
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 13px; border-radius:99px; font-size:12.5px; font-weight:700;
  line-height:1;
}
.pill-green{ background:var(--green-soft); color:var(--green-dim); }

.account-switch-btn{
  flex:1; border:none; background:transparent; color:var(--text-dim);
  font-weight:700; font-size:13.5px; padding:10px 0; border-radius:11px;
  cursor:pointer; transition:background .15s ease, color .15s ease;
  -webkit-tap-highlight-color:transparent;
}
.account-switch-btn.active{ background:var(--green); color:#06140d; }
.pill-neutral{ background:rgba(0,0,0,.06); color:var(--ink-dim); }
.view.dark .pill-neutral{ background:rgba(255,255,255,.08); color:var(--text-dim); }
.pill-red{ background:var(--red-soft); color:var(--red); }

.divider{ height:1px; background:var(--line); border:none; margin:14px 0; }
.divider-dark{ height:1px; background:rgba(255,255,255,.08); border:none; margin:14px 0; }

a{ color:inherit; text-decoration:none; }

/* ============== AVATAR + STREAK BADGE ============== */
.avatar-wrap{ position:relative; flex:0 0 auto; }
.avatar{
  width:46px;height:46px; border-radius:50%;
  background:var(--surface-3); color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:800; font-size:15px;
}
.avatar.lg{ width:72px; height:72px; font-size:22px; }
.streak-badge{
  position:absolute; top:-9px; right:-11px;
  background:linear-gradient(135deg,#ffb238,#ff8a00);
  color:#1a0e00;
  font-family:'Unbounded',sans-serif;
  font-weight:700;
  font-size:10.5px;
  padding:3px 7px 3px 5px;
  border-radius:99px;
  display:flex; align-items:center; gap:2px;
  border:2px solid var(--bg);
  white-space:nowrap;
  box-shadow:0 3px 8px rgba(0,0,0,.35);
}
.streak-badge.on-paper{ border-color:var(--paper); }
.streak-badge svg{ width:11px; height:11px; }

/* ============== TXN LIST ============== */
.txn{ display:flex; align-items:center; gap:12px; padding:12px 0; cursor:pointer; }
.txn-icon{
  width:42px;height:42px; border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  flex:0 0 auto; font-size:18px;
}
.txn-meta{ flex:1 1 auto; min-width:0; }
.txn-title{ font-weight:700; font-size:14.5px; line-height:1.35; }
.txn-sub{ font-size:12.5px; color:var(--ink-dim); margin-top:2px; line-height:1.35; }
.view.dark .txn-sub{ color:var(--text-dim); }
.txn-amt{ font-weight:800; font-size:14.5px; white-space:nowrap; }

/* ============== TAB BAR (fixed alignment) ============== */
.tabbar{
  flex:0 0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  align-items:start;
  padding:9px 4px max(14px, env(safe-area-inset-bottom)) 4px;
  background:rgba(250,250,248,.94);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
}
.tabbar.on-dark{ background:rgba(10,10,10,.92); border-top:1px solid rgba(255,255,255,.08); }
.tab{
  display:flex; flex-direction:column; align-items:center;
  gap:5px; color:#a6a49a; cursor:pointer; background:none; border:none;
  padding:6px 0 0; -webkit-tap-highlight-color:transparent;
}
.tabbar.on-dark .tab{ color:#5e5e5e; }
.tab.active{ color:var(--ink); }
.tabbar.on-dark .tab.active{ color:var(--green); }
.tab-icon{ height:22px; display:flex; align-items:center; justify-content:center; line-height:1; }
.tab-icon svg{ width:22px; height:22px; display:block; }
.tab-text{ font-size:10px; font-weight:700; line-height:1; letter-spacing:.01em; }

/* ============== MANHOLE SVG ============== */
.manhole-icon{ display:block; }

/* ============== HATCH TAP SCREEN ============== */
.hatch-wrap{ display:flex; align-items:center; justify-content:center; position:relative; height:268px; }
.hatch-glow{
  position:absolute; width:260px;height:260px; border-radius:50%;
  background:radial-gradient(circle, rgba(33,196,109,.28), transparent 65%);
  animation:pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{transform:scale(1);opacity:.65;} 50%{transform:scale(1.07);opacity:1;} }
.hatch-btn{
  width:196px;height:196px; border-radius:50%;
  background:repeating-conic-gradient(from 0deg,#3a3a3a 0deg 6deg,#2c2c2c 6deg 12deg);
  border:7px solid #161616;
  box-shadow:inset 0 0 0 9px #1e1e1e, inset 0 6px 14px rgba(0,0,0,.6),
    0 12px 0 0 #050505, 0 18px 30px rgba(0,0,0,.55);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; position:relative; z-index:5; user-select:none;
  transition:transform .07s ease, box-shadow .07s ease;
}
.hatch-btn::before{
  content:""; position:absolute; width:148px;height:148px; border-radius:50%;
  border:2px dashed rgba(33,196,109,.55); top:50%; left:50%; transform:translate(-50%,-50%);
}
.hatch-btn::after{
  content:""; position:absolute; width:100px;height:100px; border-radius:50%;
  background:#252525; box-shadow:inset 0 4px 10px rgba(0,0,0,.7), inset 0 0 0 3px #161616;
}
.hatch-btn.pressed{ transform:translateY(8px); box-shadow:inset 0 0 0 9px #1e1e1e, inset 0 6px 14px rgba(0,0,0,.6), 0 3px 0 0 #050505, 0 6px 14px rgba(0,0,0,.55); }
.hatch-btn .rivet{ width:8px;height:8px;border-radius:50%; background:#0c0c0c; box-shadow:inset 0 1px 1px rgba(255,255,255,.15); position:absolute; z-index:6; }
.hatch-btn .hatch-label{ position:relative; z-index:7; }
.float-coin{
  position:absolute; font-family:'Unbounded',sans-serif; font-weight:700;
  color:var(--gold); font-size:18px; opacity:0; pointer-events:none; z-index:60;
}
@keyframes floatUp{ 0%{transform:translateY(0) scale(1);opacity:1;} 100%{transform:translateY(-64px) scale(1.15);opacity:0;} }

.progress-track{ height:8px; border-radius:99px; background:rgba(255,255,255,.1); overflow:hidden; }
.progress-fill{ height:100%; background:linear-gradient(90deg,var(--green),var(--gold)); border-radius:99px; transition:width .3s ease; }
.progress-track.light{ background:rgba(0,0,0,.08); }

@keyframes shakeX{
  0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);} 80%{transform:translateX(4px);}
}
.shake{ animation:shakeX .4s ease; }

/* ============== SUCCESS ANIMATION ============== */
.success-stage{ display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
.success-ring{
  width:92px;height:92px; border-radius:50%; background:var(--green);
  display:flex;align-items:center;justify-content:center; position:relative;
  animation:ringPop .55s cubic-bezier(.34,1.56,.64,1) both;
}
.success-ring::before{
  content:""; position:absolute; inset:-10px; border-radius:50%;
  border:3px solid var(--green); opacity:0; animation:ringPulse 1s ease-out .35s 2;
}
@keyframes ringPop{ 0%{transform:scale(0);opacity:0;} 60%{transform:scale(1.12);opacity:1;} 100%{transform:scale(1);opacity:1;} }
@keyframes ringPulse{ 0%{transform:scale(.9);opacity:.6;} 100%{transform:scale(1.5);opacity:0;} }
.success-check{ width:38px;height:38px; opacity:0; animation:checkIn .35s ease .35s both; }
@keyframes checkIn{ 0%{opacity:0;transform:scale(.5);} 100%{opacity:1;transform:scale(1);} }
.success-check path{ stroke-dasharray:40; stroke-dashoffset:40; animation:drawCheck .4s ease .4s forwards; }
@keyframes drawCheck{ to{ stroke-dashoffset:0; } }
.success-x path{ stroke-dasharray:30; stroke-dashoffset:30; animation:drawCheck .4s ease .4s forwards; }
.fade-up{ opacity:0; animation:fadeUpIn .45s ease .5s both; }
.fade-up.delay1{ animation-delay:.45s; }
.fade-up.delay2{ animation-delay:.6s; }
.fade-up.delay3{ animation-delay:.72s; }
@keyframes fadeUpIn{ 0%{opacity:0;transform:translateY(8px);} 100%{opacity:1;transform:translateY(0);} }
.confetti-piece{ position:absolute; width:6px;height:6px;border-radius:1px; opacity:0; animation:confettiFall 1.1s ease-out forwards; pointer-events:none; }
@keyframes confettiFall{ 0%{transform:translateY(0) rotate(0deg);opacity:1;} 100%{transform:translateY(130px) rotate(360deg);opacity:0;} }

/* ============== KEYPAD ============== */
.keypad{ display:grid; grid-template-columns:repeat(3,1fr); }
.key{
  text-align:center; padding:17px 0; font-size:23px; font-weight:700;
  color:#fff; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent;
  border-radius:14px; transition:background .1s ease;
}
.key:active{ background:rgba(255,255,255,.08); }

/* ============== CONTACT ROW ============== */
.contact-row{ display:flex; align-items:center; gap:12px; padding:12px 0; cursor:pointer; }

/* ============== TOAST ============== */
#toast{
  position:absolute; left:50%; bottom:110px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:13px 20px; border-radius:14px;
  font-size:13.5px; font-weight:700; opacity:0; pointer-events:none;
  transition:opacity .25s ease, transform .25s ease; z-index:200; white-space:nowrap;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}
#toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ============== LOADING SPINNER ============== */
.spinner{
  width:16px;height:16px;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.35); border-top-color:#fff;
  display:inline-block; animation:spin .7s linear infinite;
  vertical-align:-3px;
}
.spinner.dark{ border-color:rgba(0,0,0,.2); border-top-color:var(--ink); }
@keyframes spin{ to{ transform:rotate(360deg); } }
.btn.loading{ pointer-events:none; opacity:.75; }
#fullLoader{
  position:absolute; inset:0; background:rgba(10,10,10,.55); z-index:500;
  display:none; align-items:center; justify-content:center; backdrop-filter:blur(2px);
}
#fullLoader.show{ display:flex; }
#fullLoader .box{
  background:var(--bg); color:#fff; padding:22px 28px; border-radius:18px;
  display:flex; align-items:center; gap:12px; font-weight:700; font-size:13.5px;
  box-shadow:0 16px 40px rgba(0,0,0,.4);
}

/* ============== TICKET CARD ============== */
.ticket-card{
  background:linear-gradient(135deg,var(--surface-2),var(--surface-3));
  border-radius:var(--r-lg); padding:18px; color:#fff; position:relative; overflow:hidden; cursor:pointer;
}
.ticket-card::after{
  content:""; position:absolute; right:-30px; top:-30px; width:120px;height:120px;
  background:radial-gradient(circle,rgba(33,196,109,.3),transparent 70%);
}

/* ============== DEP MODAL ============== */
.modal-backdrop{
  position:absolute; inset:0; background:rgba(0,0,0,.55); z-index:300;
  display:none; align-items:flex-end; justify-content:center;
}
.modal-backdrop.show{ display:flex; }
.modal-sheet{
  width:100%; background:var(--bg); color:#fff; border-radius:26px 26px 0 0;
  padding:26px 24px max(26px, env(safe-area-inset-bottom));
  animation:sheetUp .25s ease both;
}
@keyframes sheetUp{ 0%{ transform:translateY(100%); } 100%{ transform:translateY(0); } }
.dep-result-icon{ width:74px;height:74px;border-radius:50%; display:flex;align-items:center;justify-content:center; margin:0 auto; }

/* ============== WHEEL OF FORTUNE ============== */
.wheel-stage{
  display:flex; align-items:center; justify-content:center; position:relative;
  padding:20px 0 10px;
}
.wheel-pointer{
  position:absolute; top:-2px; left:50%; transform:translateX(-50%);
  width:0; height:0; z-index:10;
  border-left:14px solid transparent; border-right:14px solid transparent;
  border-top:22px solid var(--gold);
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.4));
}
.wheel-outer{
  width:268px; height:268px; border-radius:50%;
  background:#161616;
  border:7px solid #0c0c0c;
  box-shadow:0 16px 36px rgba(0,0,0,.5), inset 0 0 0 3px rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.wheel-disc{
  width:240px; height:240px; border-radius:50%;
  position:relative;
  transition:transform 4.2s cubic-bezier(.12,.78,.13,1);
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.3);
}
.wheel-disc .seg-label{
  position:absolute; left:50%; top:50%;
  transform-origin:center center;
  font-family:'Unbounded',sans-serif;
  font-weight:700;
  color:#fff;
  font-size:12.5px;
  white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.5);
}
.wheel-hub{
  position:absolute; width:46px; height:46px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffe39a, var(--gold) 65%, #149c5b 100%);
  border:4px solid #0c0c0c;
  z-index:8;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.wheel-spin-btn{
  margin-top:18px;
}
.wheel-disc.spinning{ filter:saturate(1.1); }

/* ============== Misc ============== */
.empty-hint{ text-align:center; padding:40px 20px; color:var(--ink-dim); font-size:13.5px; line-height:1.6; }
.view.dark .empty-hint{ color:var(--text-dim); }
.seat-grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:6px; max-width:260px; margin:0 auto; }

/* ============== КАРТЫ ============== */
.mvk-card-body{
  width:100%;
  aspect-ratio:1.586;
  border-radius:20px;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-sizing:border-box;
  box-shadow:0 16px 40px rgba(0,0,0,.45);
  position:relative;
  overflow:hidden;
}
.mvk-card-body::before{
  content:'';
  position:absolute;
  top:-40%;right:-20%;
  width:80%;height:80%;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  pointer-events:none;
}
.seat{ aspect-ratio:1; border-radius:5px; cursor:pointer; transition:transform .1s ease; }
.seat:active{ transform:scale(.9); }

<script>
'use strict';

/* ======================================================================
   МВК Банк 2.0 — полностью клиентское приложение, данные в localStorage
   ====================================================================== */

const STORAGE_KEY = 'mvk_bank_v2';
const ACCOUNTS_KEY = 'mvk_bank_accounts_v2';

/* ---- МУЛЬТИАККАУНТ ---- */
function getAllAccounts(){
  try{ return JSON.parse(localStorage.getItem(ACCOUNTS_KEY)||'[]'); }catch(e){ return []; }
}
function saveAllAccounts(list){
  try{ localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(list)); }catch(e){}
}
function saveCurrentAccountToList(){
  if(!state||!state.auth||!state.auth.registered) return;
  const list = getAllAccounts();
  const key = state.auth.phoneDigits;
  const idx = list.findIndex(a=>a.phoneDigits===key);
  const entry = { phoneDigits:key, pin:state.auth.pin, firstName:state.auth.firstName, lastName:state.auth.lastName, storageKey: STORAGE_KEY+'_'+key };
  if(idx>=0) list[idx]=entry; else list.push(entry);
  saveAllAccounts(list);
  // save this account's state to its own key
  try{ localStorage.setItem(entry.storageKey, JSON.stringify(state)); }catch(e){}
}
function creditToAccount(phoneFormatted, amt, senderName){
  // phoneFormatted вида "+7 916 123-45-67", вытащим digits
  const digits = phoneFormatted.replace(/\D/g,'').slice(-10);
  const list = getAllAccounts();
  const entry = list.find(a=>a.phoneDigits===digits);
  if(!entry) return; // получатель не зарегистрирован на этом устройстве
  const key = entry.storageKey;
  try{
    const raw = localStorage.getItem(key);
    const recvState = raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
    if(raw && JSON.parse(raw).hatch) recvState.hatch = Object.assign(defaultState().hatch, JSON.parse(raw).hatch);
    if(raw && JSON.parse(raw).auth) recvState.auth = Object.assign(defaultState().auth, JSON.parse(raw).auth);
    recvState.balanceRub = (recvState.balanceRub||0) + amt;
    const txn = { id:'txn_'+Math.random().toString(36).slice(2,9), date:new Date().toISOString(),
      type:'transfer_in', title:senderName, amountRub:amt };
    if(!recvState.transactions) recvState.transactions=[];
    recvState.transactions.unshift(txn);
    localStorage.setItem(key, JSON.stringify(recvState));
  }catch(e){}
}

function switchToAccount(phoneDigits){
  saveCurrentAccountToList();
  const list = getAllAccounts();
  const entry = list.find(a=>a.phoneDigits===phoneDigits);
  if(!entry){ toast('Аккаунт не найден'); return; }
  try{
    const raw = localStorage.getItem(entry.storageKey);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign(defaultState(), parsed);
      state.auth  = Object.assign(defaultState().auth,  parsed.auth||{});
      state.hatch = Object.assign(defaultState().hatch, parsed.hatch||{});
      state.transactions = parsed.transactions || [];
      state.contacts     = parsed.contacts     || [];
      state.cards        = parsed.cards        || [];
    } else {
      state = defaultState();
      state.auth.registered  = true;
      state.auth.phoneDigits = entry.phoneDigits;
      state.auth.pin         = entry.pin;
      state.auth.firstName   = entry.firstName;
      state.auth.lastName    = entry.lastName;
      state.transactions = [];
    }
    state.auth.loggedIn = false; // потребуем PIN
    saveState();
  }catch(e){ toast('Ошибка загрузки аккаунта'); return; }
  navigate('pin-login');
}

function showFullLoader(text){
  const el = document.getElementById('fullLoader');
  const t = document.getElementById('fullLoaderText');
  if(t) t.textContent = text || 'Загрузка…';
  if(el) el.classList.add('show');
}
function hideFullLoader(){
  const el = document.getElementById('fullLoader');
  if(el) el.classList.remove('show');
}

const TAP_DAY_GOAL = 1000;
const MAX_LEVEL = 10;

const LEVEL_PER_TAP = [2, 4, 7, 13, 24, 45, 85, 160, 350, 1000];
const LEVEL_NAMES = [
  'Ржавая крышка', 'Стальная крышка', 'Усиленная крышка', 'Армированный люк',
  'Промышленный люк', 'Бронированный люк', 'Титановый люк', 'Люк МВК Pro',
  'Люк МВК Elite', 'Люк МВК Максимум'
];

const RUB_TO_KZT = 5.12;

/* ---------------------------- УТИЛИТЫ ---------------------------- */

function fmt(n){ return Math.round(n).toLocaleString('ru-RU'); }
function fmtSigned(n){ return (n>=0?'+':'−')+fmt(Math.abs(n)); }
function todayKey(d){
  d = d || new Date(Date.now()+(state?state.debugDayOffset:0)*86400000);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function nowISO(){ return new Date(Date.now()+(state?state.debugDayOffset:0)*86400000).toISOString(); }
function fmtTime(iso){ const d=new Date(iso); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function fmtDateShort(iso){ const d=new Date(iso),m=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек']; return d.getDate()+' '+m[d.getMonth()]; }
function isToday(iso){ return todayKey(new Date(iso))===todayKey(); }
function isYesterday(iso){ const y=new Date(Date.now()+(state?state.debugDayOffset:0)*86400000-86400000); return todayKey(new Date(iso))===todayKey(y); }
function uid(p){ return (p||'id')+'_'+Math.random().toString(36).slice(2,9); }
function initials(name){ const p=name.trim().split(/\s+/); return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'??'; }
function clampDigits(str,maxLen){ return str.replace(/\D/g,'').slice(0,maxLen); }
function formatPhoneInput(digits){
  let d=digits,out='+7';
  if(d.length>0) out+=' '+d.slice(0,3);
  if(d.length>3) out+=' '+d.slice(3,6);
  if(d.length>6) out+='-'+d.slice(6,8);
  if(d.length>8) out+='-'+d.slice(8,10);
  return out;
}
function vibrate(ms){ if(navigator.vibrate) try{ navigator.vibrate(ms); }catch(e){} }

/* ---------------------------- ЗВУК ---------------------------- */

const AudioCtxClass = window.AudioContext||window.webkitAudioContext;
let actx=null;
function getCtx(){ if(!actx) actx=new AudioCtxClass(); if(actx.state==='suspended') actx.resume(); return actx; }
function playTone(freq,t,dur,type,peak){
  const ctx=getCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();
  osc.type=type||'sine'; osc.frequency.setValueAtTime(freq,t);
  gain.gain.setValueAtTime(0.0001,t); gain.gain.exponentialRampToValueAtTime(peak||0.16,t+0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  osc.connect(gain).connect(ctx.destination); osc.start(t); osc.stop(t+dur+0.02);
}
function sndTap(){ try{ const ctx=getCtx(),t=ctx.currentTime; playTone(740,t,.08,'triangle',.10); playTone(1180,t+.015,.08,'sine',.07); }catch(e){} }

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      state = Object.assign(defaultState(), p);
      state.hatch = Object.assign(defaultState().hatch, p.hatch||{});
      state.auth  = Object.assign(defaultState().auth,  p.auth||{});
      state.transactions = p.transactions || [];
      state.contacts     = p.contacts     || [];
      state.cards        = p.cards        || [];
      state.settings = Object.assign(defaultState().settings, p.settings||{});
      if(!Array.isArray(state.settings.tabOrder) || state.settings.tabOrder.length!==5){
        state.settings.tabOrder = defaultState().settings.tabOrder;
      }
    } else {
      state = defaultState();
    }
  }catch(e){ state = defaultState(); }
  applyTheme();
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  // Also update per-account storage
  if(state&&state.auth&&state.auth.registered&&state.auth.phoneDigits){
    try{ localStorage.setItem(STORAGE_KEY+'_'+state.auth.phoneDigits, JSON.stringify(state)); }catch(e){}
  }
}

// Префикс +7 — статичный текст вне поля, пользователь печатает только 10 цифр.
// Это полностью исключает баг "code country съедает цифры номера".

function phoneFieldHTML(id, digits, onInputFn){
  const masked = phoneMaskDisplay(digits);
  return `<div class="phone-field-wrap">
    <span class="prefix">+7</span>
    <input id="${id}" inputmode="numeric" placeholder="999 123-45-67" autocomplete="tel"
      value="${masked}" oninput="${onInputFn}(this)">

function phoneMaskDisplay(digits){
  let d = digits;
  let out = '';
  if(d.length>0) out += d.slice(0,3);
  if(d.length>3) out += ' ' + d.slice(3,6);
  if(d.length>6) out += '-' + d.slice(6,8);
  if(d.length>8) out += '-' + d.slice(8,10);
  return out;
}
function onPhoneMaskInput(el, setterFn){
  const digits = clampDigits(el.value, 10);
  setterFn(digits);
  el.value = phoneMaskDisplay(digits);
  el.setSelectionRange(el.value.length, el.value.length);
}

// вызывается при каждом заходе на экран Люка — проверяет не "протух" ли день
function syncHatchDay(){
  const h = state.hatch;
  const tk = todayKey();
  if(h.lastTapDateKey === tk) return; // тот же день, ничего не делаем

  if(h.lastTapDateKey === null){
    // первый визит вообще
    h.lastTapDateKey = tk;
    h.todayTaps = 0;
    h.todayGoalMet = false;
    saveState();
    return;
  }

  // проверим, является ли tk следующим днём после lastTapDateKey
  const prev = new Date(h.lastTapDateKey + 'T00:00:00');
  const diffDays = Math.round((new Date(tk+'T00:00:00') - prev) / 86400000);

  if(!h.streakLocked){
    if(diffDays === 1 && h.todayGoalMet){
      // вчера выполнили норму — серия продолжается
      h.streakDays += 1;
      if(h.streakDays >= 10){
        h.streakLocked = true;
        h.level = MAX_LEVEL;
      } else {
        h.level = Math.min(MAX_LEVEL, h.streakDays + 1);
      }
    } else if(diffDays >= 1) {
      // пропустили день ИЛИ не выполнили норму — серия сгорает
      h.streakDays = 0;
      h.level = 1;
    }
  }

  h.lastTapDateKey = tk;
  h.todayTaps = 0;
  h.todayGoalMet = false;
  saveState();
}

function currentPerTap(){
  const lvl = Math.min(state.hatch.level, MAX_LEVEL);
  return LEVEL_PER_TAP[lvl-1];
}
function currentLevelName(){
  const lvl = Math.min(state.hatch.level, MAX_LEVEL);
  return LEVEL_NAMES[lvl-1];
}

function doTap(){
  const h = state.hatch;
  const gain = currentPerTap();
  h.coins += gain;
  h.todayTaps += 1;

  if(!h.todayGoalMet && h.todayTaps >= TAP_DAY_GOAL){
    h.todayGoalMet = true;
    if(!h.historyDates.includes(todayKey())) h.historyDates.push(todayKey());
    toast('Дневная норма выполнена — серия продлится завтра 🔥');
  }
  saveState();
  return gain;
}

function tapsLeftToday(){
  return Math.max(0, TAP_DAY_GOAL - state.hatch.todayTaps);
}

/* ---------- ВЫВОД МОНЕТ И "ДЕП" ---------- */

const COIN_TO_RUB = 0.1; // курс: 10 монет = 1 ₽ (для информационного блока на экране Люка)

function coinsToRub(coins){
  return Math.round(coins * COIN_TO_RUB);
}

function doNormalCashout(coinsAmount){
  const h = state.hatch;
  if(coinsAmount <= 0 || coinsAmount > h.coins) return null;
  const rub = coinsToRub(coinsAmount);
  h.coins -= coinsAmount;
  state.balanceRub += rub;
  addTxn({ type:'hatch_cashout', title:'Вывод из Люка', amountRub: rub, icon:'manhole' });
  saveState();
  return rub;
}

// "Деп" — рискованная конвертация: 40% ×2, 55% сгорает, 5% ×1000
function rollDep(coinsAmount){
  const h = state.hatch;
  if(coinsAmount <= 0 || coinsAmount > h.coins) return null;
  const baseRub = coinsToRub(coinsAmount);
  h.coins -= coinsAmount;

  const roll = Math.random()*100;
  let outcome, resultRub;
  if(roll < 40){
    outcome = 'double'; resultRub = baseRub*2;
  } else if(roll < 95){
    outcome = 'burn'; resultRub = 0;
  } else {
    outcome = 'jackpot'; resultRub = baseRub*1000;
  }

  if(resultRub > 0){
    state.balanceRub += resultRub;
    addTxn({ type:'hatch_dep', title: outcome==='jackpot' ? 'Деп — джекпот!' : 'Деп — удвоение', amountRub: resultRub, icon:'manhole' });
  } else {
    addTxn({ type:'hatch_dep_burn', title:'Деп — сумма сгорела', amountRub: -baseRub, isBurn:true, icon:'manhole' });
  }
  saveState();
  return { outcome, baseRub, resultRub };
}

function afterRender(){
  if(currentRoute === 'ticket-success'){
    renderTicketQR();

    setTimeout(()=>{ sndSuccess(); spawnConfetti(); }, 80);
  }
  if(currentRoute === 'wheel-result'){
    const outcome = routeParams.dep.outcome;
    setTimeout(()=>{
      if(outcome === 'burn') sndFail();
      else if(outcome === 'jackpot') sndJackpot();
      else sndSuccess();
      if(outcome !== 'burn') spawnConfetti();
    }, 80);
  }
  if(currentRoute === 'send-success' || currentRoute === 'ticket-success' || currentRoute === 'exchange-success' || currentRoute === 'exchange-back-success'){
    setTimeout(()=>{ sndSuccess(); spawnConfetti(); }, 80);
  }
  if(currentRoute === 'register-phone' || currentRoute === 'login'){
    const input = document.getElementById('phoneInput');
    if(input) input.focus();
  }

function spawnConfetti(){
  const stage = document.querySelector('.success-stage');
  if(!stage) return;
  const colors = ['#21c46d','#ffffff','#3ee089','#8a8a8a'];
  for(let i=0;i<18;i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.background = colors[i%colors.length];
    c.style.left = (40 + Math.random()*200) + 'px';
    c.style.top = (Math.random()*20) + 'px';
    c.style.animationDelay = (Math.random()*0.25)+'s';
    stage.appendChild(c);
    setTimeout(()=>c.remove(), 1500);
  }
}

  // Check other saved accounts
  const list = getAllAccounts();
  const entry = list.find(a => a.phoneDigits === loginForm.digits && a.pin === loginForm.pin);
  if(entry){
    // Load that account's state
    try{
      const raw = localStorage.getItem(entry.storageKey);
      if(raw){
        const parsed = JSON.parse(raw);
        state = Object.assign(defaultState(), parsed);
        state.auth = Object.assign(defaultState().auth, parsed.auth||{});
        state.hatch = Object.assign(defaultState().hatch, parsed.hatch||{});
      } else {
        // Restore from accounts list entry
        state = defaultState();
        state.auth.registered = true;
        state.auth.phoneDigits = entry.phoneDigits;
        state.auth.pin = entry.pin;
        state.auth.firstName = entry.firstName;
        state.auth.lastName = entry.lastName;
      }
      state.auth.loggedIn = true;
      saveState();
      loginForm.digits=''; loginForm.pin=''; loginForm.error='';
      navigate('home');
      return;
    }catch(e){}
  }
  loginForm.error = 'Неверный номер или код-пароль';
  navigate('login');
}

function logout(){
  saveCurrentAccountToList();
  state.auth.loggedIn = false;
  saveState();
  loginForm.digits=''; loginForm.pin=''; loginForm.error='';
  navigate('welcome');
}

let _confirmModalCallback = null;
function showConfirmModal(message, onYes){

  state.settings.tabOrder = order;
  saveState();
  navigate('customize');
}

function txnIconBg(type){
  if(type==='transfer_out') return {bg:'var(--red-soft)', color:'var(--red)'};
  if(type==='transfer_in') return {bg:'var(--green-soft)', color:'var(--green-dim)'};
  if(type==='ticket') return {bg:'rgba(255,255,255,.08)', color:'var(--ink)'};
  if(type==='hatch_cashout'||type==='hatch_dep') return {bg:'var(--green-soft)', color:'var(--green-dim)'};
  if(type==='hatch_dep_burn') return {bg:'var(--red-soft)', color:'var(--red)'};
  if(type==='topup') return {bg:'var(--green-soft)', color:'var(--green-dim)'};
  if(type==='exchange') return {bg:'rgba(255,255,255,.08)', color:'var(--ink)'};
  if(type==='welcome_bonus') return {bg:'var(--green-soft)', color:'var(--green-dim)'};
  return {bg:'rgba(255,255,255,.08)', color:'var(--ink)'};
}
function txnIconGlyph(t){
  if(t.type==='transfer_out') return icon('out',18);
  if(t.type==='transfer_in') return icon('in',18);
  if(t.type==='ticket') return icon('ticket',18);
  if(t.type==='hatch_cashout'||t.type==='hatch_dep'||t.type==='hatch_dep_burn') return manholeIcon(18);
  if(t.type==='topup') return icon('card',18);
  if(t.type==='exchange') return icon('swap',18);
  if(t.type==='welcome_bonus') return icon('bolt',18);
  return icon('doc',18);
}
function txnSubtitle(t){
  const when = isToday(t.date) ? 'сегодня, '+fmtTime(t.date) : (isYesterday(t.date) ? 'вчера, '+fmtTime(t.date) : fmtDateShort(t.date)+', '+fmtTime(t.date));
  if(t.type==='transfer_out') return 'Перевод · '+when;
  if(t.type==='transfer_in') return 'Перевод от друга · '+when;
  if(t.type==='ticket') return 'Покупка билета · '+when;
  if(t.type==='hatch_cashout') return 'Вывод из Люка · '+when;
  if(t.type==='hatch_dep') return 'Деп · '+when;
  if(t.type==='hatch_dep_burn') return 'Деп · '+when;
  if(t.type==='topup') return 'Пополнение · '+when;
  if(t.type==='exchange') return 'Обмен валюты · '+when;
  if(t.type==='welcome_bonus') return 'Бонус при регистрации · '+when;
  return when;
}
function txnRowHTML(t){
  const colors = txnIconBg(t.type);
  const amt = t.amountRub;

  return `<div class="txn" onclick="navigate('receipt',{txnId:'${t.id}'})">

}

function dayWord(n){
  const n10 = n % 10, n100 = n % 100;
  if(n100 >= 11 && n100 <= 14) return 'дней';
  if(n10 === 1) return 'день';
  if(n10 >= 2 && n10 <= 4) return 'дня';
  return 'дней';
}

function levelLadderHTML(){
  const h = state.hatch;
  return LEVEL_PER_TAP.map((perTap, idx)=>{
    const lvl = idx+1;
    const isCurrent = lvl === h.level;
    const isUnlocked = lvl <= h.level;
    return `<div class="row between" style="padding:8px 0;${idx<9?'border-bottom:1px solid rgba(255,255,255,.06);':''}">
      <div class="row gap10">
        <div style="width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;
          background:${isCurrent?'var(--green)':isUnlocked?'rgba(255,255,255,.12)':'rgba(255,255,255,.05)'};
          color:${isCurrent?'#06140d':isUnlocked?'#fff':'var(--text-faint)'};">${lvl}</div>
        <span class="small" style="color:${isUnlocked?'#fff':'var(--text-faint)'};font-weight:${isCurrent?'800':'600'};">${LEVEL_NAMES[idx]}</span>
      </div>
      <span class="small num" style="color:${isUnlocked?'var(--gold)':'var(--text-faint)'};font-weight:700;">+${fmt(perTap)} ₽</span>
    </div>`;
  }).join('');
}

function onTapHatch(e){
  const gain = doTap();
  sndTap();
  vibrate(8);

  const btn = document.getElementById('hatchBtn');
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'), 90);

  const wrap = document.getElementById('hatchWrap');
  const rect = wrap.getBoundingClientRect();
  const fly = document.createElement('div');
  fly.className = 'float-coin';
  fly.textContent = '+' + fmt(gain);
  const x = (e.clientX - rect.left) || rect.width/2;
  const y = (e.clientY - rect.top) || rect.height/2;
  fly.style.left = x+'px'; fly.style.top = y+'px';
  fly.style.animation = 'floatUp .8s ease-out forwards';
  wrap.appendChild(fly);
  setTimeout(()=>fly.remove(), 800);

  // лёгкое обновление счётчиков без полного перерендера (плавнее)
  document.querySelectorAll('.num').forEach(()=>{}); // no-op safeguard
  const coinEl = wrap.parentElement.querySelector('.pad.center .num');
  if(coinEl) coinEl.textContent = fmt(state.hatch.coins);
  const goalRow = document.querySelector('.progress-fill');
  if(goalRow){
    const pct = Math.min(100, Math.round(state.hatch.todayTaps/TAP_DAY_GOAL*100));
    goalRow.style.width = pct+'%';
  }
  const tapsLabel = document.querySelectorAll('.row.between.mb8 .small.num')[0];
  if(tapsLabel) tapsLabel.textContent = fmt(state.hatch.todayTaps)+' / '+fmt(TAP_DAY_GOAL);

  if(state.hatch.todayGoalMet && !onTapHatch._celebrated){
    onTapHatch._celebrated = true;
  }
}

// Сектора колеса по часовой стрелке от 0°, общая окружность = 100%
// 40% ×2 (зелёный) → 55% сгорает (красный) → 5% ×1000 (золотой)
const WHEEL_SEGMENTS = [
  { key:'double',  pct:40, color:'#21c46d', colorDark:'#189656', label:'×2' },
  { key:'burn',    pct:55, color:'#e2574c', colorDark:'#b53c33', label:'СГОРИТ' },
  { key:'jackpot', pct:5,  color:'#ffb238', colorDark:'#ff8a00', label:'×1000' }
];

function wheelConicGradient(){
  let acc = 0;
  const stops = [];
  WHEEL_SEGMENTS.forEach(seg=>{
    const start = acc/100*360;
    acc += seg.pct;
    const end = acc/100*360;
    stops.push(`${seg.color} ${start}deg ${end}deg`);
  });
  return `conic-gradient(from 0deg, ${stops.join(', ')})`;
}

function wheelSegmentLabels(){
  let acc = 0;
  return WHEEL_SEGMENTS.map(seg=>{
    const midPct = acc + seg.pct/2;
    acc += seg.pct;
    const angle = midPct/100*360;
    // Текст остаётся горизонтальным и читаемым: поворачиваем точку крепления
    // на угол сектора, смещаем по радиусу к ободу, затем компенсируем поворот
    // обратно на -angle, чтобы сама надпись не была повёрнута боком.
    const radius = seg.pct >= 40 ? 58 : 84;
    return `<div class="seg-label" style="transform:translate(-50%,-50%) rotate(${angle}deg) translateY(-${radius}px) rotate(${-angle}deg);">${seg.label}</div>`;
  }).join('');
}

// возвращает угол (в градусах от 0 до 360), на который должна повернуться стрелка-указатель,
// чтобы остановиться в середине сектора заданного outcome
function angleForOutcome(outcome){
  let acc = 0;
  for(const seg of WHEEL_SEGMENTS){
    if(seg.key === outcome){
      const mid = acc + seg.pct/2;
      return mid/100*360;
    }
    acc += seg.pct;
  }
  return 0;
}

function spinWheel(){
  if(wheelState.spinning) return;
  wheelState.spinning = true;

  const btn = document.getElementById('spinBtn');
  const hint = document.getElementById('wheelHint');
  const disc = document.getElementById('wheelDisc');
  if(btn){ btn.disabled = true; btn.textContent = 'Крутится…'; }
  if(hint) hint.textContent = 'Колесо крутится — удачи!';

  // честно определяем исход ЗАРАНЕЕ (как и раньше), затем просто визуализируем его на колесе
  const roll = Math.random()*100;
  let outcome;
  if(roll < 40) outcome = 'double';
  else if(roll < 95) outcome = 'burn';
  else outcome = 'jackpot';

  const targetMidAngle = angleForOutcome(outcome);
  // стрелка фиксирована сверху (0°/12 часов), значит диск должен повернуться так,
  // чтобы нужный сектор оказался под стрелкой: поворот = -targetMidAngle (по часовой)
  // плюс несколько полных оборотов для эффектности, плюс небольшой случайный джиттер внутри сектора
  const segObj = WHEEL_SEGMENTS.find(s=>s.key===outcome);
  const jitterRange = Math.min(segObj.pct, 4); // не вылезаем за пределы маленького сектора джекпота
  const jitter = (Math.random()-0.5) * jitterRange/100*360;
  const extraSpins = 5; // полных оборотов перед остановкой
  const finalRotation = extraSpins*360 + (360 - targetMidAngle - jitter);

  disc.style.transition = 'transform 4.2s cubic-bezier(.12,.78,.13,1)';
  disc.style.transform = `rotate(${finalRotation}deg)`;

  sndSwap();
  let tickCount = 0;
  const tickInterval = setInterval(()=>{
    sndTap();
    tickCount++;
    if(tickCount>=14) clearInterval(tickInterval);
  }, 280);

  setTimeout(()=>{
    clearInterval(tickInterval);
    const dep = rollDepWithOutcome(wheelState.coinsAmount, outcome);
    wheelState.resultDep = dep;
    navigate('wheel-result', { dep });
  }, 4300);
}

// тот же экономический эффект, что и rollDep, но исход уже определён заранее (колесом)
function rollDepWithOutcome(coinsAmount, outcome){
  const h = state.hatch;
  const baseRub = coinsToRub(coinsAmount);
  h.coins -= coinsAmount;

  let resultRub;
  if(outcome === 'double') resultRub = baseRub*2;
  else if(outcome === 'jackpot') resultRub = baseRub*1000;
  else resultRub = 0;

  if(resultRub > 0){
    state.balanceRub += resultRub;
    addTxn({ type:'hatch_dep', title: outcome==='jackpot' ? 'Деп — джекпот на колесе!' : 'Деп — удвоение на колесе', amountRub: resultRub, icon:'manhole' });
  } else {
    addTxn({ type:'hatch_dep_burn', title:'Деп — сумма сгорела', amountRub: -baseRub, isBurn:true, icon:'manhole' });
  }
  saveState();
  return { outcome, baseRub, resultRub };
}

const historyFilter = { type: 'all' };

function viewHistory(){
  const filters = [
    {id:'all', label:'Все'},
    {id:'transfer', label:'Переводы'},
    {id:'ticket', label:'Билеты'},
    {id:'hatch', label:'Люк'}
  ];
  let list = state.transactions;
  if(historyFilter.type === 'transfer') list = list.filter(t=>t.type==='transfer_in'||t.type==='transfer_out');
  if(historyFilter.type === 'ticket') list = list.filter(t=>t.type==='ticket');
  if(historyFilter.type === 'hatch') list = list.filter(t=>t.type.startsWith('hatch_'));

  const groups = {};
  list.forEach(t=>{
    const key = isToday(t.date) ? 'Сегодня' : isYesterday(t.date) ? 'Вчера' : fmtDateShort(t.date);
    if(!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  return `
  <div class="view paper active">
    <div class="topbar">
      <button class="iconbtn" onclick="navigate('home')">${icon('back',20)}</button>
      <div class="center-label">История</div>
      <button class="iconbtn" onclick="confirmClearHistory()" title="Очистить историю">${icon('trash',18)}</button>
    </div>
    <div class="view-scroll">
      <div class="pad pad-t0">
        <div class="row gap8 mb20" style="overflow-x:auto;">
          ${filters.map(f=>`<button class="pill" style="border:none;cursor:pointer;flex:0 0 auto;${historyFilter.type===f.id?'background:var(--ink);color:#fff;':'background:var(--paper-2);color:var(--ink);'}" onclick="setHistoryFilter('${f.id}')">${f.label}</button>`).join('')}
        </div>
        ${list.length===0 ? `<div class="empty-hint">Операций пока нет</div>` :
          Object.keys(groups).map(g=>`
            <div class="eyebrow mb8 mt16">${g}</div>
            ${groups[g].map(t=>txnRowHTML(t)).join('')}
          `).join('')}
      </div>
    </div>
    ${tabBarHTML('history', false)}
  </div>`;
}

  historyFilter.type = id;

}

function genCardNumber(){
  return Array.from({length:4},()=>Math.floor(1000+Math.random()*9000)).join(' ');
}
function genExpiry(){
  const now=new Date(); const y=(now.getFullYear()+3).toString().slice(-2);
  const m=String(now.getMonth()+1).padStart(2,'0'); return m+'/'+y;
}
function genCVV(){ return String(Math.floor(100+Math.random()*900)); }

function cardSVG(card, showBack){
  // Адаптивная ширина — 100% контейнера через CSS, не через инлайн-пикселы
  const c = CARD_CATALOG.find(x=>x.id===card.type)||CARD_CATALOG[0];
  const num = card.number||'•••• •••• •••• ••••';
  const masked = num.replace(/(\d{4} \d{4} \d{4} )(\d{4})/,'$1****');
  if(showBack){
    return `<div class="mvk-card-body" style="background:${c.gradient};">

    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Unbounded',sans-serif;font-weight:700;font-size:14px;color:${c.textColor};letter-spacing:.05em;">МВК</span>

    </div>
    <div style="font-size:17px;font-weight:700;letter-spacing:3px;color:${c.textColor};font-family:monospace;margin:16px 0 0;">${masked}</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;">

        <div style="font-size:9px;color:${c.textColor};opacity:.65;letter-spacing:.12em;margin-bottom:3px;">КАРТА ВЫДАНА</div>

function issueCard(typeId){
  if(!state.cards) state.cards = [];
  if(state.cards.find(c=>c.type===typeId)){ toast('Карта этого типа уже оформлена'); return; }
  const cat = CARD_CATALOG.find(x=>x.id===typeId);
  const card = {
    id: uid('card'),
    type: typeId,
    number: genCardNumber(),
    expiry: genExpiry(),
    cvv: genCVV(),
    holder: (state.auth.firstName+' '+state.auth.lastName).toUpperCase(),
    balance: 0,
    status: 'active',
    issuedAt: nowISO()
  };
  state.cards.unshift(card);
  saveState();
  sndSuccess();
  toast('Карта «'+cat.name+'» оформлена!');
  navigate('card-detail', { cardId: card.id });
}

  const cat = CARD_CATALOG.find(x=>x.id===card.type)||CARD_CATALOG[0];
  showConfirmModal('Удалить карту «'+cat.name+'»? Это действие нельзя отменить.', ()=>{
    state.cards = state.cards.filter(c=>c.id!==cardId);
    saveState();
    toast('Карта удалена');
    navigate('cards');
  });
}

function onPinDigit(k){
  if(k === '⌫'){
    pinForm.entered = pinForm.entered.slice(0,-1);
  } else {
    if(pinForm.entered.length >= 4) return;
    pinForm.entered += k;
    vibrate(6);
  }
  if(pinForm.entered.length === 4){
    if(pinForm.entered === state.auth.pin){
      sndSuccess();
      pinForm.entered = '';
      navigate('home');
    } else {
      sndFail();
      vibrate(80);
      pinForm.entered = '';
      navigate('pin-login', { pinError: 'Неверный PIN, попробуйте ещё раз' });
      return;
    }
    return;
  }
  navigate('pin-login');
}

/* ======================================================================
   QR-ПЕРЕВОДЫ: генерация QR на получение + ручной ввод кода
   ====================================================================== */

// Кодируем данные перевода в компактную строку и генерируем QR через внешнюю
// библиотеку. Если библиотека недоступна — показываем текстовый код для копипаста.
// Формат данных: mvkpay:{phone}:{amount}:{name}
// Пример: mvkpay:9161234567:500:Иван Петров

function makePayCode(phone, amount, name){
  return `mvkpay:${phone}:${amount}:${encodeURIComponent(name)}`;
}

function parsePayCode(str){
  try{
    const s = str.trim();
    if(!s.startsWith('mvkpay:')) return null;
    const parts = s.split(':');
    if(parts.length < 4) return null;
    return {
      phone: parts[1],
      amount: parseInt(parts[2])||0,
      name: decodeURIComponent(parts.slice(3).join(':'))
    };
  }catch(e){ return null; }
}

function generateQRSvg(text){
  // Простой QR-паттерн через инлайн SVG — настоящий QR слишком сложен без библиотеки,
  // поэтому показываем стилизованный QR-блок + текстовый код для копипаста/набора вручную
  const hash = Array.from(text).reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0, 0);
  const size = 21;
  const cells = [];
  // Угловые маркеры (finder patterns)
  const marker = (ox, oy) => {
    for(let r=0;r<7;r++) for(let c=0;c<7;c++){
      const border = r===0||r===6||c===0||c===6;
      const center = r>=2&&r<=4&&c>=2&&c<=4;
      if(border||center) cells.push(`<rect x="${ox+c}" y="${oy+r}" width="1" height="1" fill="black"/>`);
    }
  };
  marker(0,0); marker(14,0); marker(0,14);
  // Разделители уже пустые (белые)
  // Timing patterns
  for(let i=8;i<13;i++){
    if(i%2===0){ cells.push(`<rect x="${i}" y="6" width="1" height="1" fill="black"/>`); }
    if(i%2===0){ cells.push(`<rect x="6" y="${i}" width="1" height="1" fill="black"/>`); }
  }
  // Модули данных — псевдослучайные но детерминированные по хешу текста
  let seed = Math.abs(hash);
  const used = new Set();
  // отмечаем занятые области
  for(let r=0;r<7;r++) for(let c=0;c<7;c++){ used.add(`${r},${c}`); used.add(`${r},${c+14}`); used.add(`${r+14},${c}`); }
  for(let i=0;i<size;i++){ used.add(`6,${i}`); used.add(`${i},6`); }

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      if(used.has(`${r},${c}`)) continue;
      seed = (seed*1664525+1013904223)&0xffffffff;
      if((seed>>>0)%3 === 0){
        cells.push(`<rect x="${c}" y="${r}" width="1" height="1" fill="black"/>`);
      }
    }
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="180" height="180" xmlns="http://www.w3.org/2000/svg" style="display:block;border-radius:8px;">
    <rect width="${size}" height="${size}" fill="white"/>
    ${cells.join('')}
  </svg>`;
}

// --- QR Camera logic ---
let qrStream = null;
let qrScanInterval = null;

async function startQrCamera(facing){
  const msg = document.getElementById('qrCameraMsg');
  if(msg) msg.style.display = 'none';
  if(qrStream){ qrStream.getTracks().forEach(t=>t.stop()); qrStream=null; }
  clearInterval(qrScanInterval);
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: facing || 'environment', width:{ideal:640}, height:{ideal:640} }
    });
    qrStream = stream;
    const video = document.getElementById('qrVideo');
    if(!video){ stopQrCamera(); return; }
    video.srcObject = stream;
    video.play();
    // Use BarcodeDetector if available
    if(window.BarcodeDetector){
      const detector = new BarcodeDetector({formats:['qr_code']});
      qrScanInterval = setInterval(async ()=>{
        try{
          const codes = await detector.detect(video);
          if(codes.length > 0){
            const raw = codes[0].rawValue;
            clearInterval(qrScanInterval);
            stopQrCamera();
            qrScanForm.input = raw;
            qrScanForm.error = '';
            submitQrScan();
          }
        }catch(e){}
      }, 500);
    } else {
      // Fallback: jsQR via canvas
      loadJsQR(video);
    }
  }catch(e){
    const msg2 = document.getElementById('qrCameraMsg');
    if(msg2){ msg2.innerHTML = '<div style="font-size:32px;">⛔</div><p class="small">Нет доступа к камере. Разрешите в настройках браузера.</p>'; msg2.style.display='flex'; }
  }
}

function loadJsQR(video){
  if(window.jsQR){ startJsQRScan(video); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
  s.onload = ()=>startJsQRScan(video);
  s.onerror = ()=>{ toast('Камера работает, но автодекод недоступен — введите код вручную'); };
  document.head.appendChild(s);
}

function startJsQRScan(video){
  const canvas = document.getElementById('qrCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  qrScanInterval = setInterval(()=>{
    if(!video.videoWidth) return;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    const code = jsQR(img.data, img.width, img.height);
    if(code){
      clearInterval(qrScanInterval);
      stopQrCamera();
      qrScanForm.input = code.data;
      qrScanForm.error = '';
      submitQrScan();
    }
  }, 400);
}

function stopQrCamera(){
  clearInterval(qrScanInterval);
  qrScanInterval = null;
  if(qrStream){ qrStream.getTracks().forEach(t=>t.stop()); qrStream=null; }
}

function getQrScanHint(){
  const raw = qrScanForm.input.trim();
  if(!raw) return '';
  const parsed = parseQrInput(raw);
  if(!parsed) return '';
  return `Номер: ${formatPhoneInput(parsed.phone)}${parsed.amount>0?' · Сумма: '+fmt(parsed.amount)+' ₽':''}`;
}

function renderQrScanHint(){
  const el = document.getElementById('qrScanHint');
  if(el) el.textContent = getQrScanHint();
}

function parseQrInput(raw){
  // Принимаем: "9161234567", "9161234567:500", "mvkpay:9161234567:500:Иван"
  if(raw.startsWith('mvkpay:')){
    return parsePayCode(raw);
  }
  const parts = raw.split(':');
  const phone = parts[0].replace(/\D/g,'').slice(-10);
  if(phone.length !== 10) return null;
  const amount = parseInt(parts[1])||0;
  return { phone, amount, name: null };
}

function submitQrScan(){
  const raw = qrScanForm.input.trim();
  const parsed = parseQrInput(raw);
  if(!parsed || parsed.phone.length !== 10){
    qrScanForm.error = 'Неверный формат кода — введите 10 цифр номера';
    navigate('qr-scan'); return;
  }
  if(parsed.phone === state.auth.phoneDigits){
    qrScanForm.error = 'Нельзя переводить самому себе';
    navigate('qr-scan'); return;
  }
  qrScanForm.error = '';
  navigate('qr-pay', { phone: parsed.phone, amount: parsed.amount, name: parsed.name });
}

const qrPayForm = { amount: 0 };

function viewQrPay(){
  const phone = routeParams.phone;
  const name = routeParams.name || 'Абонент +7'+phone;
  const preset = routeParams.amount;
  if(qrPayForm._lastPhone !== phone){
    qrPayForm.amount = preset || 0;
    qrPayForm._lastPhone = phone;
  }
  const amt = qrPayForm.amount;
  return `
  <div class="view dark active" style="display:flex;flex-direction:column;">
    <div class="topbar">
      <button class="iconbtn" onclick="navigate('qr-scan')">${icon('back',20)}</button>
      <div class="center-label">Оплата по QR</div>
      <div></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 32px;">
      <div class="avatar lg" style="margin:0 auto 14px;background:var(--surface-3);">
        ${name ? initials(name) : '?'}
      </div>
      <div style="font-weight:800;font-size:17px;">${name}</div>
      <div class="small mt6">${formatPhoneInput(phone)}</div>
      <div class="num" style="font-family:'Unbounded',sans-serif;font-weight:700;font-size:44px;color:#fff;margin:24px 0 6px;">${amt>0?fmt(amt):0} ₽</div>
      <div class="small">Баланс: ${fmt(state.balanceRub)} ₽</div>
      <div class="field-error" id="qrPayError" style="text-align:center;"></div>
    </div>
    ${preset>0 ? '' : `
    <div class="keypad" style="padding:0 16px;">
      ${['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k=>
        k ? `<div class="key" onclick="onQrPayKey('${k}')">${k}</div>` : '<div></div>'
      ).join('')}
    </div>`}
    <div class="pad col gap10">
      <button class="btn btn-primary" onclick="executeQrPay('${phone}','${encodeURIComponent(name)}')">
        Перевести${amt>0?' '+fmt(amt)+' ₽':''}
      </button>
      <button class="btn btn-ghost-light" onclick="navigate('qr-scan')">Отмена</button>
    </div>
  </div>`;
}

function onQrPayKey(k){
  if(k==='⌫'){
    qrPayForm.amount = Math.floor(qrPayForm.amount/10);
  } else {
    if(qrPayForm.amount > 999999) return;
    qrPayForm.amount = qrPayForm.amount*10 + parseInt(k);
  }
  const el = document.querySelector('.num[style*="44px"]');
  if(el) el.textContent = fmt(qrPayForm.amount)+' ₽';
}

function executeQrPay(phone, encodedName){
  const name = decodeURIComponent(encodedName);
  const amt = qrPayForm.amount;
  if(amt <= 0){ toast('Введите сумму'); return; }
  if(amt > state.balanceRub){
    const errEl = document.getElementById('qrPayError');
    if(errEl) errEl.textContent = 'Недостаточно средств';
    return;
  }
  const fullPhone = formatPhoneInput(phone);
  const contact = { id:'qr_'+phone, name, phone: fullPhone };
  state.balanceRub -= amt;
  if(!state.contacts.find(x=>x.phone===fullPhone)) state.contacts.unshift(contact);
  addTxn({ type:'transfer_out', title:name, amountRub:-amt, contactPhone:fullPhone });
  creditToAccount(fullPhone, amt, state.auth.firstName+' '+state.auth.lastName);
  qrPayForm.amount = 0;
  qrPayForm._lastPhone = null;
  qrScanForm.input = '';
  sndSuccess();
  navigate('send-success', { contact, amount: amt });
}

document.addEventListener('DOMContentLoaded', () => {
  loadState();
  if(state.auth.loggedIn){
    pinForm.entered = '';
    navigate('pin-login');
  } else {
    navigate('welcome');
  }
});
